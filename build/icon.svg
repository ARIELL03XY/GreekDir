<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF4EA"/>
      <stop offset="1" stop-color="#F1E2CD"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cluster" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#6b4423" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- macOS-style rounded background plate -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#sheen)"/>
  <rect x="100.5" y="100.5" width="823" height="823" rx="184.5" fill="none" stroke="#C9AE86" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Treemap cluster (disk-usage blocks) -->
  <g filter="url(#cluster)">
    <!-- big block -->
    <rect x="200" y="200" width="352" height="352" rx="26" fill="#B5613A"/>
    <!-- right column -->
    <rect x="570" y="200" width="254" height="168" rx="26" fill="#D9854F"/>
    <rect x="570" y="386" width="254" height="166" rx="26" fill="#E7C08A"/>
    <!-- bottom row -->
    <rect x="200" y="570" width="254" height="254" rx="26" fill="#9C8552"/>
    <rect x="472" y="570" width="168" height="254" rx="26" fill="#7E4A2E"/>
    <rect x="658" y="570" width="166" height="118" rx="26" fill="#E39C63"/>
    <rect x="658" y="706" width="166" height="118" rx="26" fill="#EBD3AC"/>
    <!-- subtle top sheen on each block -->
    <g fill="url(#sheen)">
      <rect x="200" y="200" width="352" height="352" rx="26"/>
      <rect x="570" y="200" width="254" height="168" rx="26"/>
      <rect x="570" y="386" width="254" height="166" rx="26"/>
      <rect x="200" y="570" width="254" height="254" rx="26"/>
      <rect x="472" y="570" width="168" height="254" rx="26"/>
      <rect x="658" y="570" width="166" height="118" rx="26"/>
      <rect x="658" y="706" width="166" height="118" rx="26"/>
    </g>
  </g>
</svg>
